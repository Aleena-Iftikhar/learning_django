<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Recipe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <h2>Update Recipe</h2>
    <hr>
    <div class="mb-3">
      <label class="form-label">Recipe Name</label>
      <input name="recipe_name" required type="text" class="form-control">
    </div>
    <div class="mb-3">
      <label class="form-label">Description</label>
      <textarea name="description" required class="form-control" rows="3" placeholder="Enter description"></textarea>
    </div>
    <div class="mb-3">
      <label for="image" class="form-label">Recipe Image</label>
      <input name="image" type="file" class="form-control" id="image" accept="image/*">
    </div>
    <button type="submit" class="btn btn-primary mb-4">Add Recipe</button>
  </form>

  <table class="table table-bordered align-middle">
    <thead class="table-dark">
      <tr>
        <th scope="col">#</th>
        <th scope="col">Name</th>
        <th scope="col">Description</th>
        <th scope="col">Image</th>
        <th scope="col">Action</th>
      </tr>
    </thead>
    <tbody>
      {% for recipe in Recipes %}
      <tr>
        <th scope="row">{{ forloop.counter }}</th>
        <td>{{ recipe.recipe_name }}</td>
        <td>{{ recipe.description }}</td>
        <td>
          {% if recipe.image %}
            <img src="/media/{{ recipe.image }}" style="height: 200px; width: 200px; object-fit: cover;">
          {% else %}
            <span class="text-muted">No image</span>
          {% endif %}
        </td>
        <td>
          <a href="/delete_recipe/{{ recipe.id }}" class="btn btn-danger btn-sm m-2">Delete</a>
          <a href="/update_recipe/{{ recipe.id }}" class="btn btn-success btn-sm m-2">Update</a>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>

</div>

</body>
</html>
