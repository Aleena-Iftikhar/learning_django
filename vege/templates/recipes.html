<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Recipe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container">

  <form method = "post" enctype="multipart/form-data">
    {% csrf_token %}
  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">recipe Name</label>
    <input name = "recipe_name" required type="text" class="form-control" >
  </div>
  <div class="mb-3">
    <label for="exampleInputPassword1" class="form-label">description</label>
    <textarea name="description" required class="form-control" id="description" rows="3" placeholder="Enter description"></textarea>
  </div>
  <div class="mb-3">
      <label for="image" class="form-label">Recipe Image</label>
      <input name="image" type="file" class="form-control" id="image" accept="image/*">
    </div>
  <button type="submit" class="btn btn-primary">Submit</button>
</form>



<table class="table">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">Name</th>
      <th scope="col">Discription</th>
      <th scope="col">Image</th>
    </tr>
  </thead>
  <tbody>
    {% for recipe in Recipes %}
    <tr>
      <th scope="row">{{forloop.counter}}</th>
      <td>{{recipe.recipe_name}}</td>
      <td>{{recipe.description}}</td>
      <td>{{recipe.image}}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>

</div>

</body>
</html>
