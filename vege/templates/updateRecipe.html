{% extends "base.html" %}

{% block title %}Update Recipe{% endblock %}

{% block content %}

<div class="container mt-4">

  <form class="col-6 mx-auto card p-3 shadow-lg" method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <h2>Update Recipe</h2>
    <hr>
    <div class="mb-3">
      <label class="form-label">Recipe Name</label>
      <input name="recipe_name" value="{{Recipes.recipe_name}}" required type="text" class="form-control">
    </div>
    <div class="mb-3">
      <label class="form-label">Description</label>
      <textarea name="description" required class="form-control" rows="3" placeholder="Enter description">{{Recipes.description}}</textarea>
    </div>
    <div class="mb-3">
      <label for="image" class="form-label">Recipe Image</label>
      <input name="image" type="file" class="form-control" id="image" accept="image/*">
    </div>
    <button type="submit" class="btn btn-primary mb-4">Update Recipe</button>
  </form>


</div>

{% endblock %}
